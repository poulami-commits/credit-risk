version: "3.9"

services:
  api:
    build: .
    container_name: credit-risk-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro  # mount trained model as read-only
    environment:
      - DEBUG=false
      - MODEL_PATH=/app/models/xgb_credit_risk.joblib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
